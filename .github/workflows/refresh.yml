name: Refresh vendored skills

# Scheduled job that re-pulls external skills to their latest upstream commit
# and opens a PR. Nothing is auto-merged — a human reviews third-party changes.

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}     # allow manual runs

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Re-pull vendored skills at latest upstream
        run: |
          pip install ruamel.yaml
          python3 scripts/vendor-sync.py --latest

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/refresh-vendored-skills
          title: "chore: refresh vendored skills"
          commit-message: "chore: refresh vendored skills to latest upstream"
          body: |
            Automated refresh of `skills/.vendored/` to the latest upstream commits.

            **Review before merging** — this contains third-party changes.
            Confirm `skills.yml` pins and re-run any required audit.
          labels: skills, automated
          delete-branch: true

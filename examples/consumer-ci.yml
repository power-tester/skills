# Drop this into a CONSUMER repo at .github/workflows/skills.yml
# It keeps that repo's Claude Code agent on the latest pramodyadav027 standards.
name: Sync pramodyadav027 skills

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * 1"   # weekly, Monday 07:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx -y @pramodyadav027/skills sync

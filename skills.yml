# skills.yml — source of truth for all skills in this collection.
#
# Consumer: npx @pramodyadav027/skills-pm sync
#   Reads this file from GitHub and installs each skill from its upstream repo.
#
# Maintainer: npx @pramodyadav027/skills-pm fetch
#   Reads this file locally and pulls SKILL.md files into skills/ for review.
#
# Fields:
#   repo     — "owner/repo" path on the git host
#   host     — git host (github.com | gitlab.com | bitbucket.org | self-hosted); default: github.com
#   path     — base path within the repo where skill subdirectories live ("." for root)
#   ref      — branch, tag, or commit SHA to pin to
#   enabled  — set to false to skip without removing the entry
#   select   — optional list of skill names to install; omit to install all from the repo

skills:
  # vercel-labs/web-interface-guidelines has no SKILL.md — kept as a entry to test that process should not fail if a repo has no skills.
  - repo: vercel-labs/web-interface-guidelines
    path: .
    ref: main
    enabled: false

  - repo: vercel-labs/agent-skills
    path: skills
    ref: main
    enabled: true
    select:
      - writing-guidelines
      - react-best-practices
